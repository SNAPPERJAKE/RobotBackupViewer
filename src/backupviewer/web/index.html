<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FANUC Backup Viewer</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/components.css">
</head>
<body>
<div id="app">
  <header id="topbar">
    <div id="logo" title="backupviewer">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path fill="currentColor" d="M12 2 2 7v10l10 5 10-5V7L12 2zm0 2.2 7.5 3.75L12 11.7 4.5 7.95 12 4.2zM4 9.6l7 3.5v6.7l-7-3.5V9.6zm16 0v6.7l-7 3.5v-6.7l7-3.5z"/>
      </svg>
      <span class="logo-text">backup<span class="logo-accent">viewer</span></span>
    </div>
    <nav id="sessionbar" aria-label="open backups" class="hidden"></nav>
    <div id="topbar-right">
      <div class="search-box" id="global-search" title="search the whole backup (ctrl+k)">
        <span class="si">⌕</span>
        <input type="text" placeholder="search backup…" spellcheck="false">
      </div>
      <button class="icon-btn" id="btn-compare" title="compare with another backup">compare</button>
      <button class="icon-btn" id="btn-theme" title="theme — colors, fonts &amp; background (t)">🎨</button>
      <button class="icon-btn" id="btn-cog" title="settings — 3d view, library folder">⚙</button>
      <button class="icon-btn" id="btn-help" title="shortcuts (?)">?</button>
    </div>
  </header>
  <nav id="tabbar" aria-label="tabs"></nav>
  <div id="toolbar" class="hidden"></div>
  <main id="view" tabindex="-1"></main>
  <div id="jobstrip" class="hidden"></div>
  <footer id="statusbar">
    <span id="status-left"></span>
    <span id="status-right"></span>
  </footer>
</div>
<div id="modal-root" class="hidden"></div>

<script src="js/util.js"></script>
<script src="js/api.js"></script>
<script src="js/state.js"></script>
<script src="js/jobs.js"></script>
<script src="js/theme.js"></script>
<script src="js/bgfx.js"></script>
<script src="js/settings_ui.js"></script>
<script src="js/theme_ui.js"></script>
<script src="js/scan_ui.js"></script>
<script src="js/manage_ui.js"></script>
<script src="js/update.js"></script>
<script src="js/highlight_tp.js"></script>
<script src="js/components/vtable.js"></script>
<script src="js/components/multitable.js"></script>
<script src="js/components/vsdiff.js"></script>
<script src="js/components/search.js"></script>
<script src="js/components/checklist.js"></script>
<script src="js/components/libtree.js"></script>
<script src="js/components/pill.js"></script>
<script src="js/components/segmented.js"></script>
<script src="js/components/builders.js"></script>
<script src="js/components/table.js"></script>
<script src="js/components/framecard.js"></script>
<script src="js/components/dragreorder.js"></script>
<script src="js/components/backuptabs.js"></script>
<script src="js/components/proj3d.js"></script>
<script src="js/components/fk.js"></script>
<script src="js/tabs/overview.js"></script>
<script src="js/tabs/frames.js"></script>
<script src="js/tabs/io.js"></script>
<script src="js/tabs/registers.js"></script>

<script src="js/tabs/dcs.js"></script>
<script src="js/tabs/sysvars.js"></script>
<script src="js/tabs/mhvalves.js"></script>
<script src="js/cvxremote.js"></script>
<script src="js/mtxremote.js"></script>
<script src="js/tabs/photos.js"></script>
<script src="js/tabs/files.js"></script>
<script src="js/tabs/view3d.js"></script>
<script src="js/tabs/search.js"></script>
<script src="js/tabs/compare.js"></script>
<script src="js/tabs/pdiff.js"></script>
<script src="js/tabs/home.js"></script>
<script src="js/keys.js"></script>
<script src="js/router.js"></script>
</body>
</html>
